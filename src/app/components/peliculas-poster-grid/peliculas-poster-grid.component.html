<div class="grid-container">
  <div class="movie-card animate__animated animate__fadeIn"
       *ngFor="let movie of movies"
       (click)="onMovieClick(movie)">

    <div class="card-poster">
      <img [src]="movie.poster_path | poster" [alt]="movie.title" class="poster-img">
      <div class="card-overlay">
        <div class="overlay-content">
          <h3 class="overlay-title">{{ movie.title }}</h3>
          <p class="overlay-overview">{{ movie.overview | slice:0:115 }}</p>
          <div class="overlay-rating">
            <span class="star">&#9733;</span>
            <span class="rating-num">{{ movie.vote_average | number:'1.1-1' }}</span>
            <span class="rating-max">/10</span>
          </div>
        </div>
      </div>
    </div>

    <div class="card-info">
      <p class="card-title">{{ movie.title }}</p>
      <div class="card-meta">
        <span class="card-year">{{ movie.release_date | date:'yyyy' }}</span>
        <span class="card-score">
          <span class="star-sm">&#9733;</span> {{ movie.vote_average | number:'1.1-1' }}
        </span>
      </div>
    </div>

  </div>
</div>
