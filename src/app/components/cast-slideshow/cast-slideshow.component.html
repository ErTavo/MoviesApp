<div class="cast-scroll">
  <div class="cast-card" *ngFor="let actor of cast | slice:0:20">
    <div class="actor-img-wrapper">
      <img [src]="actor.profile_path | poster" [alt]="actor.name" class="actor-img">
    </div>
    <div class="actor-info">
      <p class="actor-name">{{ actor.name }}</p>
      <p class="actor-character">{{ actor.character }}</p>
    </div>
  </div>
</div>
