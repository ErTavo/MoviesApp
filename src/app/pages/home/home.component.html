<div class="home-page">

  <div class="home-hero">
    <h1 class="home-title">En Cartelera</h1>
    <p class="home-subtitle">Las películas más recientes en cines</p>
    <div class="search-wrapper">
      <form (ngSubmit)="onSubmit()" [formGroup]="formGroup">
        <div class="search-bar">
          <input type="text" placeholder="Buscar película por título..." formControlName="buscar" />
          <button type="submit">
            <img src="../../../assets/search.svg" alt="buscar">
          </button>
        </div>
      </form>
    </div>
  </div>

  <div class="home-grid">
    <app-peliculas-poster-grid *ngIf="movies.length > 0" [movies]="movies">
    </app-peliculas-poster-grid>
  </div>

</div>
